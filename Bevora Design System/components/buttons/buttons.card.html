<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:26px;background:var(--neutral-25);font-family:var(--font-sans)}
.grp{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px}
.lbl{width:100%;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:2px}</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton } = window.BevoraDesignSystem_cc741a;
function Demo(){
  return (<div>
    <div class="grp"><span class="lbl">Variants</span>
      <Button variant="primary">Primary</Button>
      <Button variant="accent">Book a consultation</Button>
      <Button variant="secondary">Secondary</Button>
      <Button variant="ghost">Ghost</Button>
      <Button variant="danger">Danger</Button>
    </div>
    <div class="grp"><span class="lbl">Sizes & icons</span>
      <Button size="sm" variant="accent">Small</Button>
      <Button size="md" variant="accent" iconRight={<span>→</span>}>Medium</Button>
      <Button size="lg" variant="accent">Large</Button>
      <Button variant="secondary" disabled>Disabled</Button>
      <IconButton variant="accent" aria-label="next"><span>→</span></IconButton>
      <IconButton variant="secondary" aria-label="more"><span>⋯</span></IconButton>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
