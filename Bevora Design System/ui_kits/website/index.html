<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bevora — IT services that just work</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--bg-page)}
  .bv-mobile-nav{display:none}
  @keyframes bvpulse{0%,100%{opacity:1}50%{opacity:.35}}
  .bv-pulse{animation:bvpulse 1.8s var(--ease-in-out) infinite}
  @media (max-width:880px){
    .bv-desktop-nav{display:none !important}
    .bv-mobile-nav{display:block}
    .bv-hero-grid,.bv-why-grid,.bv-contact-grid,.bv-footer-grid{grid-template-columns:1fr !important}
    .bv-svc-grid{grid-template-columns:1fr 1fr !important}
    .bv-stats-grid{grid-template-columns:1fr 1fr !important}
  }
  @media (max-width:560px){
    .bv-svc-grid{grid-template-columns:1fr !important}
    .bv-footer-grid{grid-template-columns:1fr 1fr !important}
  }
</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
