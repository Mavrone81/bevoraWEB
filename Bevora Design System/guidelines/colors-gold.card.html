<!-- @dsCard group="Colors" viewport="700x150" name="Brand gold scale" subtitle="Espresso → goldenrod → bright gold, sampled from the mark" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--neutral-0)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px}
  .sw .n{font-weight:600}
  .light{color:var(--neutral-950)} .dark{color:#fff}
</style></head><body>
<div class="row">
  <div class="sw light" style="background:var(--gold-50)"><span class="n">50</span></div>
  <div class="sw light" style="background:var(--gold-100)"><span class="n">100</span></div>
  <div class="sw light" style="background:var(--gold-200)"><span class="n">200</span></div>
  <div class="sw light" style="background:var(--gold-300)"><span class="n">300</span></div>
  <div class="sw light" style="background:var(--gold-400)"><span class="n">400</span></div>
  <div class="sw dark" style="background:var(--gold-500)"><span class="n">500 · core</span></div>
  <div class="sw dark" style="background:var(--gold-600)"><span class="n">600</span></div>
  <div class="sw dark" style="background:var(--gold-700)"><span class="n">700</span></div>
  <div class="sw dark" style="background:var(--gold-800)"><span class="n">800</span></div>
  <div class="sw dark" style="background:var(--gold-900)"><span class="n">900</span></div>
</div>
</body></html>
