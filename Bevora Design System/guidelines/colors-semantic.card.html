<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Muted, professional — never neon" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--neutral-0);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .item{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden}
  .bar{height:56px} .lbl{padding:8px 10px}
  .name{font-weight:700;font-size:13px;color:var(--text-primary)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
</style></head><body>
<div class="grid">
  <div class="item"><div class="bar" style="background:var(--success-500)"></div><div class="lbl"><div class="name">Success</div><div class="hex">#2e7d57</div></div></div>
  <div class="item"><div class="bar" style="background:var(--warning-500)"></div><div class="lbl"><div class="name">Warning</div><div class="hex">#d98a0b</div></div></div>
  <div class="item"><div class="bar" style="background:var(--danger-500)"></div><div class="lbl"><div class="name">Danger</div><div class="hex">#b3402f</div></div></div>
  <div class="item"><div class="bar" style="background:var(--info-500)"></div><div class="lbl"><div class="name">Info</div><div class="hex">#2f6f8f</div></div></div>
</div>
</body></html>
