<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid — space-1 → space-12" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--neutral-0);font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--gold-400);border-radius:3px;width:22px}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="height:var(--space-1)"></div>1·4</div>
  <div class="col"><div class="box" style="height:var(--space-2)"></div>2·8</div>
  <div class="col"><div class="box" style="height:var(--space-3)"></div>3·12</div>
  <div class="col"><div class="box" style="height:var(--space-4)"></div>4·16</div>
  <div class="col"><div class="box" style="height:var(--space-6)"></div>6·24</div>
  <div class="col"><div class="box" style="height:var(--space-8)"></div>8·32</div>
  <div class="col"><div class="box" style="height:var(--space-10)"></div>10·40</div>
  <div class="col"><div class="box" style="height:var(--space-12)"></div>12·48</div>
</div>
</body></html>
