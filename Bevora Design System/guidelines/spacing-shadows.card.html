<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & elevation" subtitle="Soft, warm-tinted, low-spread — plus the gold glow" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:28px 24px;background:var(--neutral-50);font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
  .row{display:flex;gap:26px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .b{width:96px;height:64px;background:var(--neutral-0);border-radius:var(--radius-lg)}
</style></head><body>
<div class="row">
  <div class="col"><div class="b" style="box-shadow:var(--shadow-xs)"></div>xs</div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-sm)"></div>sm</div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-md)"></div>md</div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-lg)"></div>lg</div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-gold)"></div>gold</div>
</div>
</body></html>
