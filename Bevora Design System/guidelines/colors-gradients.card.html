<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--neutral-0);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .g{height:120px;border-radius:var(--radius-lg);display:flex;align-items:flex-end;padding:14px;box-shadow:var(--shadow-sm)}
  .t{font-family:var(--font-mono);font-size:11px;color:#fff;background:rgba(0,0,0,.25);padding:4px 8px;border-radius:var(--radius-sm)}
</style></head><body>
<div class="grid">
  <div class="g" style="background:var(--grad-gold)"><span class="t">--grad-gold</span></div>
  <div class="g" style="background:var(--grad-ink)"><span class="t">--grad-ink</span></div>
</div>
</body></html>
