<!-- @dsCard group="Colors" viewport="700x150" name="Neutral greys" subtitle="Warm-neutral scale — carries ~90% of every layout" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--neutral-0)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px}
  .light{color:var(--neutral-900)} .dark{color:#fff}
</style></head><body>
<div class="row">
  <div class="sw light" style="background:var(--neutral-0);box-shadow:inset 0 0 0 1px var(--border-default)">0</div>
  <div class="sw light" style="background:var(--neutral-50)">50</div>
  <div class="sw light" style="background:var(--neutral-100)">100</div>
  <div class="sw light" style="background:var(--neutral-200)">200</div>
  <div class="sw light" style="background:var(--neutral-300)">300</div>
  <div class="sw dark" style="background:var(--neutral-400)">400</div>
  <div class="sw dark" style="background:var(--neutral-500)">500</div>
  <div class="sw dark" style="background:var(--neutral-600)">600</div>
  <div class="sw dark" style="background:var(--neutral-700)">700</div>
  <div class="sw dark" style="background:var(--neutral-800)">800</div>
  <div class="sw dark" style="background:var(--neutral-900)">900 · ink</div>
  <div class="sw dark" style="background:var(--neutral-950)">950</div>
</div>
</body></html>
