<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--neutral-0);font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
  .row{display:flex;gap:20px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .b{width:72px;height:56px;background:var(--neutral-100);border:1.5px solid var(--border-strong)}
</style></head><body>
<div class="row">
  <div class="col"><div class="b" style="border-radius:var(--radius-sm)"></div>sm · 6</div>
  <div class="col"><div class="b" style="border-radius:var(--radius-md)"></div>md · 10</div>
  <div class="col"><div class="b" style="border-radius:var(--radius-lg)"></div>lg · 14</div>
  <div class="col"><div class="b" style="border-radius:var(--radius-xl)"></div>xl · 20</div>
  <div class="col"><div class="b" style="border-radius:var(--radius-pill);width:96px"></div>pill</div>
</div>
</body></html>
