<!-- @dsCard group="Brand" viewport="700x200" name="Logo & lockup" subtitle="The gold B mark + Sora wordmark" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--neutral-0);display:flex;gap:32px;align-items:center}
  .panel{flex:1;display:flex;align-items:center;gap:16px;padding:20px;border-radius:var(--radius-lg)}
  .light{background:var(--neutral-50);border:1px solid var(--border-subtle)}
  .dark{background:var(--neutral-900)}
  img{width:64px;height:64px;border-radius:var(--radius-md)}
  .wm{font-family:var(--font-display);font-weight:800;font-size:30px;letter-spacing:-0.02em;line-height:1}
  .wm small{display:block;font-family:var(--font-sans);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:6px}
  .light .wm{color:var(--text-primary)} .light .wm small{color:var(--text-brand)}
  .dark .wm{color:#fff} .dark .wm small{color:var(--gold-300)}
</style></head><body>
  <div class="panel light"><img src="../assets/bevora-logo-square.png" alt="Bevora"><div class="wm">Bevora<small>IT Services</small></div></div>
  <div class="panel dark"><img src="../assets/bevora-mark.png" alt="Bevora mark"><div class="wm">Bevora<small>IT Services</small></div></div>
</body></html>
