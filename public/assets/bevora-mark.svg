<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Bevora beaver mascot">
  <defs>
    <linearGradient id="bvGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2008"/>
      <stop offset="0.42" stop-color="#6f4f0c"/>
      <stop offset="0.78" stop-color="#b8860b"/>
      <stop offset="1" stop-color="#cda42f"/>
    </linearGradient>
    <radialGradient id="bvCheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff9978"/>
      <stop offset="1" stop-color="#ff9978" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bvFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f1e9d4"/>
    </linearGradient>
  </defs>

  <!-- rounded badge background -->
  <rect x="0" y="0" width="120" height="120" rx="30" fill="url(#bvGold)"/>

  <!-- ears -->
  <circle cx="39" cy="41" r="13" fill="url(#bvFace)"/>
  <circle cx="81" cy="41" r="13" fill="url(#bvFace)"/>
  <circle cx="39" cy="41" r="6" fill="#e7b24b"/>
  <circle cx="81" cy="41" r="6" fill="#e7b24b"/>

  <!-- head -->
  <path d="M60 31
           C85 31 101 48 101 71
           C101 89 89 101 60 101
           C31 101 19 89 19 71
           C19 48 35 31 60 31 Z" fill="url(#bvFace)"/>

  <!-- blush cheeks -->
  <circle cx="36" cy="76" r="11" fill="url(#bvCheek)"/>
  <circle cx="84" cy="76" r="11" fill="url(#bvCheek)"/>

  <!-- eyes -->
  <circle cx="47" cy="62" r="6.6" fill="#1a1917"/>
  <circle cx="73" cy="62" r="6.6" fill="#1a1917"/>
  <circle cx="49.6" cy="59.4" r="2.3" fill="#ffffff"/>
  <circle cx="75.6" cy="59.4" r="2.3" fill="#ffffff"/>

  <!-- nose -->
  <ellipse cx="60" cy="73" rx="5.6" ry="4.2" fill="#1a1917"/>

  <!-- smile -->
  <path d="M50 81 C54 87 66 87 70 81"
        fill="none" stroke="#1a1917" stroke-width="2.4" stroke-linecap="round"/>

  <!-- buck teeth -->
  <rect x="55.6" y="84.5" width="4.3" height="9" rx="1.6" fill="#ffffff" stroke="#d9c79a" stroke-width="0.8"/>
  <rect x="60.1" y="84.5" width="4.3" height="9" rx="1.6" fill="#ffffff" stroke="#d9c79a" stroke-width="0.8"/>
</svg>
