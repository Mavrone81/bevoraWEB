<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Bevora beaver assistant">
  <defs>
    <linearGradient id="bvAvBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2008"/>
      <stop offset="0.45" stop-color="#6f4f0c"/>
      <stop offset="0.8" stop-color="#b8860b"/>
      <stop offset="1" stop-color="#cda42f"/>
    </linearGradient>
    <radialGradient id="bvAvCheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff9978"/>
      <stop offset="1" stop-color="#ff9978" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bvAvFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#f1e9d4"/>
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="46" fill="url(#bvAvBg)"/>

  <!-- ears -->
  <circle cx="30" cy="33" r="10" fill="url(#bvAvFace)"/>
  <circle cx="66" cy="33" r="10" fill="url(#bvAvFace)"/>
  <circle cx="30" cy="33" r="4.5" fill="#e7b24b"/>
  <circle cx="66" cy="33" r="4.5" fill="#e7b24b"/>

  <!-- head -->
  <path d="M48 26 C66 26 78 38 78 54 C78 67 68 76 48 76 C28 76 18 67 18 54 C18 38 30 26 48 26 Z" fill="url(#bvAvFace)"/>

  <!-- blush -->
  <circle cx="28" cy="58" r="8.5" fill="url(#bvAvCheek)"/>
  <circle cx="68" cy="58" r="8.5" fill="url(#bvAvCheek)"/>

  <!-- eyes -->
  <circle cx="38" cy="49" r="5.2" fill="#1a1917"/>
  <circle cx="58" cy="49" r="5.2" fill="#1a1917"/>
  <circle cx="39.9" cy="47.2" r="1.8" fill="#ffffff"/>
  <circle cx="59.9" cy="47.2" r="1.8" fill="#ffffff"/>

  <!-- nose -->
  <ellipse cx="48" cy="58" rx="4.4" ry="3.3" fill="#1a1917"/>

  <!-- smile -->
  <path d="M40 64 C43 68 53 68 56 64" fill="none" stroke="#1a1917" stroke-width="2" stroke-linecap="round"/>

  <!-- buck teeth -->
  <rect x="44.2" y="66" width="3.5" height="7.2" rx="1.3" fill="#ffffff" stroke="#d9c79a" stroke-width="0.7"/>
  <rect x="48.3" y="66" width="3.5" height="7.2" rx="1.3" fill="#ffffff" stroke="#d9c79a" stroke-width="0.7"/>
</svg>
